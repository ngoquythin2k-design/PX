<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Security QR</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
background:#2f3348;
font-family:Arial;
text-align:center;
color:#fff;
}

.container{
margin-top:80px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
width:320px;
margin:auto;
color:black;
}

.header{
background:#f2b84b;
padding:15px;
border-radius:10px 10px 0 0;
color:white;
font-weight:bold;
}

#time{
margin:10px;
font-size:18px;
}

.footer{
margin-top:40px;
padding:20px;
font-size:14px;
color:#ddd;
}
</style>

</head>

<body>

<div class="container">

<h2>V23080280 (Ngô Quý Thìn)</h2>

<div class="box">

<div class="header">
Quét mã QR để ra cổng
</div>

<div id="time"></div>

<div id="qrcode"></div>

</div>

<div class="footer">
Bạn đang ở khu vực bảo mật của công ty<br>
Camera điện thoại bị cấm sử dụng
</div>

</div>

<script>

function updateQR(){

document.getElementById("qrcode").innerHTML="";

let now=new Date();

let time=now.toLocaleString();

document.getElementById("time").innerHTML=time;

new QRCode(document.getElementById("qrcode"),{
text:"ID:V230080280-"+time,
width:220,
height:220
});

}

updateQR();

setInterval(updateQR,5000);

</script>

</body>
</html>
