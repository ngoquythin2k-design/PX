<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Access</title>

<style>

body{
background: linear-gradient(#2c2f48,#1b1e2f);
font-family: Arial;
text-align:center;
color:white;
}

h3{
margin-top:30px;
font-weight:500;
}

.card{
width:340px;
margin:20px auto;
background:white;
border-radius:16px;
padding-bottom:25px;
color:black;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
position:relative;
}

/* thanh vàng */

.top{
background:#e3b64b;
padding:18px;
border-radius:14px 14px 0 0;
font-size:16px;
position:relative;
}

/* 2 chấm hai bên */

.top:before,
.top:after{
content:"";
width:14px;
height:14px;
background:#2c2f48;
border-radius:50%;
position:absolute;
top:50%;
transform:translateY(-50%);
}

.top:before{
left:-7px;
}

.top:after{
right:-7px;
}

/* thời gian */

.time{
margin-top:14px;
font-size:16px;
}

/* QR */

.qr img{
width:260px;
height:260px;
image-rendering: pixelated;
}

/* refresh */

.refresh{
color:#888;
margin-top:10px;
}

/* countdown */

.count{
color:#2ecc71;
font-size:24px;
margin-top:10px;
font-weight:bold;
}

/* notice */

.notice{
width:340px;
margin:30px auto;
font-size:13px;
color:#f0dca0;
line-height:22px;
}

</style>
</head>

<body>

<h3>V23080280 (NGÔ QUÝ THÌN)</h3>

<div class="card">

<div class="top">
将二维码对准扫描器刷码出场
</div>

<div class="time" id="time"></div>

<div class="qr">
<img id="qr">
</div>

<div class="refresh">刷新二维码</div>

<div class="count" id="count">00:59:18</div>

</div>

<div class="notice">
尊敬的员工您好，您已进入企业涉密区域，
出于企业安全考虑，您的手机摄像头将被禁止拍摄。
感谢您的配合。
</div>

<script>

function updateTime(){
let d=new Date();

let t=d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()+" "
+d.getHours()+":"+d.getMinutes()+":"+d.getSeconds();

document.getElementById("time").innerHTML=t;
}

function updateQR(){
let d=new Date().getTime();

document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=V23080280-"+d;
}

updateTime();
updateQR();

setInterval(updateTime,1000);
setInterval(updateQR,30000);

</script>

</body>
</html>
