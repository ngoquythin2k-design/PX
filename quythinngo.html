<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PX Camera Control</title>
<style>
body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

h1{
margin-top:40px;
}

.box{
display:inline-block;
margin:30px;
padding:30px;
border-radius:15px;
color:white;
}

.lock{
background:#e53935;
}

.unlock{
background:#43a047;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

video{
margin-top:20px;
width:300px;
border-radius:10px;
}
</style>
</head>

<body>

<h1>PX CAMERA CONTROL</h1>

<div class="box lock">
<h2>KHÓA CAMERA</h2>
<button onclick="stopCamera()">Tắt Camera</button>
</div>

<div class="box unlock">
<h2>MỞ CAMERA</h2>
<button onclick="startCamera()">Bật Camera</button>
</div>

<br>

<video id="camera" autoplay></video>

<script>

let stream;

function startCamera(){
navigator.mediaDevices.getUserMedia({video:true})
.then(function(s){
stream=s;
document.getElementById("camera").srcObject=stream;
});
}

function stopCamera(){
if(stream){
stream.getTracks().forEach(track => track.stop());
document.getElementById("camera").srcObject=null;
}
}

</script>

</body>
</html>
